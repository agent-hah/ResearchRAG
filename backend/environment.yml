name: RAG
channels:
  - conda-forge
  - defaults
dependencies:
  - python=3.11.8
  - pip=24.0
  - numpy=1.26.4
  - pandas=2.2.0
  - pip:
      # Core Web & API
      - django==5.2.15
      - djangorestframework==3.17.1
      - django-cors-headers==4.9.0
      - uvicorn==0.27.0
      
      # RAG & AI
      - chromadb==0.4.22
      - langchain
      - langchain-google-genai
      - google-generativeai
      
      # Document Processing
      - pdfplumber==0.11.9
      - pypdf2==3.0.1
      - reportlab==4.0.9
      
      # Utilities & Data
      - plotly==5.18.0
      - pydantic==2.13.4
      - python-dotenv==1.0.1
      - python-multipart==0.0.6
      - requests==2.34.2
      
      # Cloud Database Adapters (Required for Render)
      - dj-database-url
      - psycopg2-binary