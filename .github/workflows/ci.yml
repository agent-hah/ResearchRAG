name: CI Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: read

jobs:
  # ==========================================
  # BACKEND: Pytest Job (Conda)
  # ==========================================
  backend-tests:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Conda Environment
        uses: conda-incubator/setup-miniconda@v3
        with:
          environment-file: ./backend/environment.yml
          auto-activate: true
          activate-environment: RAG
          # Miniforge uses mamba under the hood, making dependency resolution much faster
          miniforge-version: latest 

      - name: Run Database Migrations
        shell: bash -el {0}
        run: python manage.py migrate

      - name: Run Pytest
        # The '-el {0}' flag is strictly required for the runner to recognize the activated conda environment
        shell: bash -el {0}
        env:
          SECRET_KEY: ${{ secrets.DJANGO_SECRET_KEY }}
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
        run: pytest

  # ==========================================
  # FRONTEND: Vitest & Playwright Job
  # ==========================================
  frontend-tests:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '25.2.1'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run Vitest (Unit Tests)
        run: npx vitest run

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps

      - name: Run Playwright (E2E Tests)
        run: npx playwright test

      - name: Upload Playwright Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: frontend/playwright-report/
          retention-days: 14